syntax = "proto3";

package pollen.state.v1;

import "buf/validate/validate.proto";
import "pollen/admission/v1/admission.proto";

option go_package = "github.com/sambigeara/pollen/api/genpb/pollen/state/v1;statev1";

message Service {
  string name = 1;
  uint32 port = 2 [(buf.validate.field).uint32 = {
    gt: 0
    lte: 65535
  }];
}

message PeerDigest {
  uint64 max_counter = 1;
  fixed64 state_hash = 2;
}

message GossipStateDigest {
  map<string, PeerDigest> peers = 1;
}

message ServiceChange {
  string name = 1;
  uint32 port = 2;
}

message ReachabilityChange {
  string peer_id = 1 [(buf.validate.field).string = {
    pattern: "^[a-fA-F0-9]{64}$"
    len: 64
  }];
}

message NetworkChange {
  repeated string ips = 1;
  uint32 local_port = 2;
}

message ExternalPortChange {
  uint32 external_port = 1;
}

message ObservedExternalIPChange {
  string ip = 1;
}

message PubliclyAccessibleChange {}

message VivaldiCoordinateChange {
  double x = 1;
  double y = 2;
  double height = 3;
}

message IdentityChange {
  bytes identity_pub = 1 [(buf.validate.field).bytes = {len: 32}];
  int64 cert_expiry_unix = 2;
}

message RevocationChange {
  pollen.admission.v1.SignedRevocation revocation = 1 [(buf.validate.field).required = true];
}

message NatTypeChange {
  uint32 nat_type = 1;
}

message ResourceTelemetryChange {
  uint32 cpu_percent = 1;
  uint32 mem_percent = 2;
  uint64 mem_total_bytes = 3;
}

message GossipEvent {
  string peer_id = 1 [(buf.validate.field).string = {
    pattern: "^[a-fA-F0-9]{64}$"
    len: 64
  }];
  uint64 counter = 2;
  oneof change {
    NetworkChange network = 3;
    ExternalPortChange external_port = 4;
    ObservedExternalIPChange observed_external_ip = 13;
    IdentityChange identity_pub = 5;
    ServiceChange service = 6;
    ReachabilityChange reachability = 7;
    RevocationChange revocation = 9;
    PubliclyAccessibleChange publicly_accessible = 10;
    VivaldiCoordinateChange vivaldi = 11;
    NatTypeChange nat_type = 12;
    ResourceTelemetryChange resource_telemetry = 14;
  }
  bool deleted = 8;
}

message GossipEventBatch {
  repeated GossipEvent events = 1;
  bool is_response = 2;
}

// RuntimeState is the on-disk format for daemon-managed runtime state (state.pb).
message RuntimeState {
  repeated PeerState peers = 1;
  repeated pollen.admission.v1.SignedRevocation revocations = 2;
  repeated ConsumedInvite consumed_invites = 3;
}

message PeerState {
  bytes identity_pub = 1;
  repeated string addresses = 2;
  uint32 port = 3;
  uint32 external_port = 4;
  string last_addr = 5;
  string external_ip = 6;
  bool publicly_accessible = 7;
}

message ConsumedInvite {
  string token_id = 1;
  int64 expiry_unix = 2;
  int64 consumed_unix = 3;
}
