syntax = "proto3";

package pollen.state.v1;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/sambigeara/pollen/api/genpb/pollen/state/v1;statev1";

message PeerDigest {
  uint64 max_counter = 1;
  fixed64 state_hash = 2;
}

message Digest {
  map<string, PeerDigest> peers = 1;
}

enum ServiceProtocol {
  SERVICE_PROTOCOL_UNSPECIFIED = 0;
  SERVICE_PROTOCOL_TCP = 1;
  SERVICE_PROTOCOL_UDP = 2;
}

message ServiceChange {
  string name = 1;
  uint32 port = 2;
  ServiceProtocol protocol = 3;
  google.protobuf.Struct properties = 4;
}

message ReachabilityChange {
  string peer_id = 1 [(buf.validate.field).string = {
    pattern: "^[a-fA-F0-9]{64}$"
    len: 64
  }];
}

message NetworkChange {
  repeated string ips = 1;
  uint32 local_port = 2;
}

message ObservedAddressChange {
  string ip = 1;
  uint32 port = 2;
}

message PubliclyAccessibleChange {}

message VivaldiCoordinateChange {
  double x = 1;
  double y = 2;
  double height = 3;
  double error = 4;
}

message CertExpiryChange {
  int64 expiry_unix = 1;
}

message DenyChange {
  bytes peer_pub = 1 [(buf.validate.field).bytes = {len: 32}];
}

message NatTypeChange {
  uint32 nat_type = 1;
}

message ResourceTelemetryChange {
  uint32 cpu_percent = 1;
  uint32 mem_percent = 2;
  uint64 mem_total_bytes = 3;
  uint32 num_cpu = 4;
  uint32 cpu_budget_percent = 5;
  uint32 mem_budget_percent = 6;
  // admission_state is the local backpressure picture rolled up from the
  // node's gates and memory admission. OPEN means the node has headroom
  // for new work; DEGRADED means it is admitting under pressure; CLOSED
  // means new admissions will be rejected. Routing peers read this to
  // skip CLOSED targets entirely and penalise DEGRADED ones rather than
  // discovering saturation by probing.
  AdmissionState admission_state = 7;
}

enum AdmissionState {
  ADMISSION_STATE_UNSPECIFIED = 0;
  ADMISSION_STATE_OPEN = 1;
  ADMISSION_STATE_DEGRADED = 2;
  ADMISSION_STATE_CLOSED = 3;
}

message WorkloadSpecChange {
  string hash = 1;
  uint32 min_replicas = 2;
  uint64 memory_bytes = 3;
  uint32 timeout_ms = 4;
  string name = 5;
  float spread = 6;
  // latency_slo_ms is the per-invocation caller-perspective latency
  // budget. Calls completing under this contribute to the satisfied
  // counter; calls exceeding it contribute to the burn counter. The
  // ratio drives autoscale decisions.
  uint32 latency_slo_ms = 7;
  reserved 8;
  reserved "publisher_claim";
}

// SeedMetrics is the per-seed per-node telemetry bundle: served rate
// (calls/sec on this node), origin rate (calls/sec entering the cluster
// via this node), mean compute cost (ms/invocation), SLO satisfied and
// burned rates (calls/sec over the latency SLO), EWMA gate-wait (ms)
// and mean parked time (ms per invocation). Gossiped so every peer
// can score placement from the cluster-wide demand distribution, and
// cluster-wide observability (pollen_workload_slo_burn_ratio,
// compute_cost, gate_wait) can aggregate across nodes.
message SeedMetrics {
  float served_rate = 1;
  float compute_cost_ms = 2;
  float slo_satisfied_rate = 3;
  float slo_burned_rate = 4;
  reserved 5;
  reserved "gate_wait_ms";
  // Mean wall-time (ms) per invocation spent parked inside pollen_request
  // waiting for downstream responses. Subtracted from compute_cost_ms in
  // desiredReplicas so capacity sizing tracks active CPU work, not wall
  // time spent waiting on downstream calls.
  float parked_ms = 6;
  // Calls/sec for this seed that enter the cluster at this node —
  // incremented on every placement.Call entry regardless of whether the
  // node hosts the seed. The cluster-wide distribution of origin_rate
  // across peers is the demand signal placement scoring uses to pull
  // seeds toward where their traffic enters.
  float origin_rate = 7;
  // Short-window EWMA of origin_rate for burst detection. The slow
  // origin_rate reacts in seconds; this fast variant reacts in
  // sub-second so the autoscaler can respond to a microburst before it
  // has propagated into the slow EWMA. Take max(slow×headroom, fast)
  // as the arrival rate.
  float origin_rate_fast = 8;
  // Long-window EWMA of origin_rate, the steady-state companion to
  // origin_rate_fast. origin_rate (field 7) remains the canonical
  // medium-window signal callers integrate against.
  float origin_rate_slow = 9;
  // Calls/sec rejected at admission for this seed — gate at-capacity,
  // memory budget, or any other backpressure that returns OverloadError
  // before the workload runs. A non-zero reject_rate is the strongest
  // signal that the cluster is under-provisioned and forces immediate
  // scale-up regardless of where the slow origin EWMA sits.
  float reject_rate = 10;
}

message SeedMetricsChange {
  map<string, SeedMetrics> seeds = 1;
}

message BlobAvailabilityChange {
  repeated bytes digests = 1;
}

message StaticSpecChange {
  string name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
  bytes manifest_digest = 2 [(buf.validate.field).bytes = {len: 32}];
  uint32 min_replicas = 3;
  reserved 4;
  reserved "publisher_claim";
}

message StaticClaimChange {
  string name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
}

message BlobSpecChange {
  string name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
  bytes digest = 2 [(buf.validate.field).bytes = {len: 32}];
  reserved 3;
  reserved "publisher_claim";
}

message StaticPath {
  string path = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 2048
  }];
  bytes digest = 2 [(buf.validate.field).bytes = {len: 32}];
}

message StaticManifest {
  repeated StaticPath paths = 1;
}

message WorkloadClaimChange {
  string hash = 1;
  // draining signals that the publisher intends to release this claim
  // shortly. Other peers can issue a replacement claim during the
  // drain window so make-before-break overlap is preserved across the
  // handover. Default false; eligible only on persistent claims (not
  // tombstones — when the publisher actually releases, deleted=true is
  // emitted on the parent GossipEvent and this field is irrelevant).
  bool draining = 2;
}

message TrafficRate {
  string peer_id = 1 [(buf.validate.field).string = {
    pattern: "^[a-fA-F0-9]{64}$"
    len: 64
  }];
  uint64 rate_in = 2;
  uint64 rate_out = 3;
}

message TrafficHeatmapChange {
  repeated TrafficRate rates = 1;
}

message HeartbeatChange {}

message AdminCapableChange {}

message StaticCapableChange {}

message NodeNameChange {
  string name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
    pattern: "^[a-zA-Z0-9._-]+$"
  }];
}

message GossipEvent {
  string peer_id = 1 [(buf.validate.field).string = {
    pattern: "^[a-fA-F0-9]{64}$"
    len: 64
  }];
  uint64 counter = 2;
  oneof change {
    NetworkChange network = 3;
    ObservedAddressChange observed_address = 4;
    CertExpiryChange cert_expiry = 5;
    ServiceChange service = 6;
    ReachabilityChange reachability = 7;
    PubliclyAccessibleChange publicly_accessible = 9;
    VivaldiCoordinateChange vivaldi = 10;
    NatTypeChange nat_type = 11;
    ResourceTelemetryChange resource_telemetry = 12;
    DenyChange deny = 13;
    WorkloadSpecChange workload_spec = 15;
    WorkloadClaimChange workload_claim = 16;
    TrafficHeatmapChange traffic_heatmap = 17;
    HeartbeatChange heartbeat = 18;
    AdminCapableChange admin_capable = 20;
    NodeNameChange node_name = 21;
    SeedMetricsChange seed_metrics = 27;
    BlobAvailabilityChange blob_availability = 28;
    StaticSpecChange static_spec = 29;
    StaticClaimChange static_claim = 30;
    BlobSpecChange blob_spec = 31;
    StaticCapableChange static_capable = 32;
  }
  bool deleted = 14;
  reserved 24;
  reserved "seed_dial_rates";
}

message GossipEventBatch {
  repeated GossipEvent events = 1;
}

// RuntimeState is the on-disk format for daemon-managed runtime state (state.pb).
message RuntimeState {
  repeated PeerState peers = 1;
  repeated ConsumedInvite consumed_invites = 2;
  repeated bytes denied_peers = 3;
  repeated WorkloadSpecChange workload_specs = 4;
  bytes gossip_state = 5;
}

message PeerState {
  bytes peer_pub = 1;
  repeated string addresses = 2;
  uint32 port = 3;
  uint32 external_port = 4;
  string last_addr = 5;
  string external_ip = 6;
  bool publicly_accessible = 7;
}

message ConsumedInvite {
  string token_id = 1;
  int64 expiry_unix = 2;
  int64 consumed_unix = 3;
}
