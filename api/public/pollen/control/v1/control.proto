syntax = "proto3";

package pollen.control.v1;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";
import "pollen/admission/v1/admission.proto";
import "pollen/state/v1/state.proto";

option go_package = "github.com/sambigeara/pollen/api/genpb/pollen/control/v1;controlv1";

service ControlService {
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
  rpc GetBootstrapInfo(GetBootstrapInfoRequest) returns (GetBootstrapInfoResponse);
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse);
  rpc RegisterService(RegisterServiceRequest) returns (RegisterServiceResponse);
  rpc UnregisterService(UnregisterServiceRequest) returns (UnregisterServiceResponse);
  rpc ConnectService(ConnectServiceRequest) returns (ConnectServiceResponse);
  rpc ConnectPeer(ConnectPeerRequest) returns (ConnectPeerResponse);
  rpc DisconnectService(DisconnectServiceRequest) returns (DisconnectServiceResponse);
  rpc DenyPeer(DenyPeerRequest) returns (DenyPeerResponse);
  rpc SeedWorkload(stream SeedWorkloadRequest) returns (SeedWorkloadResponse);
  rpc UnseedWorkload(UnseedWorkloadRequest) returns (UnseedWorkloadResponse);
  rpc CallWorkload(CallWorkloadRequest) returns (CallWorkloadResponse);
  rpc IssueCert(IssueCertRequest) returns (IssueCertResponse);
  rpc FetchBlob(FetchBlobRequest) returns (stream FetchBlobResponse);
  rpc UploadBlob(stream UploadBlobRequest) returns (UploadBlobResponse);
  rpc RemoveBlob(RemoveBlobRequest) returns (RemoveBlobResponse);
  rpc SeedStatic(SeedStaticRequest) returns (SeedStaticResponse);
  rpc UnseedStatic(UnseedStaticRequest) returns (UnseedStaticResponse);
  rpc ListStatic(ListStaticRequest) returns (ListStaticResponse);
  rpc Inspect(InspectRequest) returns (InspectResponse);
}

message NodeRef {
  bytes peer_pub = 1;
}

enum NodeStatus {
  NODE_STATUS_UNSPECIFIED = 0;
  NODE_STATUS_ONLINE = 1;
  NODE_STATUS_OFFLINE = 2;
  NODE_STATUS_INDIRECT = 4;
}

message NodeSummary {
  NodeRef node = 1;
  NodeStatus status = 2;
  string addr = 3;
  bool publicly_accessible = 4;
  uint32 tunnel_count = 5;
  double latency_ms = 6;
  uint32 cpu_percent = 7;
  uint32 mem_percent = 8;
  uint64 traffic_rate_in = 9;
  uint64 traffic_rate_out = 10;
  uint32 num_cpu = 11;
  string name = 12;
}

message ServiceSummary {
  string name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
  }];
  NodeRef provider = 2;
  uint32 port = 3 [(buf.validate.field).uint32 = {
    gt: 0
    lte: 65535
  }];
  pollen.state.v1.ServiceProtocol protocol = 4;
}

message ShutdownRequest {}

message ShutdownResponse {}

message GetBootstrapInfoRequest {}

message BootstrapPeerInfo {
  NodeRef peer = 1;
  repeated string addrs = 2;
}

message GetBootstrapInfoResponse {
  // peers covers the distinct networks this node sees. A joiner only
  // needs to reach one — the daemon picks one representative per network
  // (LAN, public, etc.) and keeps the list short by construction.
  repeated BootstrapPeerInfo peers = 1;
}

message GetStatusRequest {}

enum CertHealth {
  CERT_HEALTH_UNSPECIFIED = 0;
  CERT_HEALTH_OK = 1;
  CERT_HEALTH_EXPIRING_SOON = 2;
  CERT_HEALTH_EXPIRED = 3;
  CERT_HEALTH_RENEWING = 4;
}

message CertInfo {
  int64 not_before_unix = 1;
  int64 not_after_unix = 2;
  uint64 serial = 3;
  CertHealth health = 4;
  bool can_delegate = 5;
  bool can_admit = 6;
  uint32 max_depth = 7;
  int64 access_deadline_unix = 8;
  google.protobuf.Struct attributes = 9;
  bool can_publish = 10;
}

message GetStatusResponse {
  NodeSummary self = 1;
  repeated NodeSummary nodes = 2;
  repeated ServiceSummary services = 3;
  repeated ConnectionSummary connections = 4;
  repeated CertInfo certificates = 5;
  bool degraded = 6;
  repeated WorkloadSummary workloads = 7;
  repeated StaticSummary sites = 8;
  repeated BlobSummary blobs = 9;
}

message BlobSummary {
  string hash = 1;
  uint32 replicas = 2;
  bool local = 3;
  string name = 4;
  NodeRef publisher = 5;
  // Set when no workload spec, named blob spec, or static manifest
  // references this digest. The janitor evicts these on its next tick.
  bool orphan = 6;
}

enum WorkloadStatus {
  WORKLOAD_STATUS_UNSPECIFIED = 0;
  WORKLOAD_STATUS_RUNNING = 1;
  reserved 2, 3;
  reserved "WORKLOAD_STATUS_STOPPED", "WORKLOAD_STATUS_ERRORED";
}

message WorkloadSummary {
  string hash = 1;
  WorkloadStatus status = 2;
  int64 started_at_unix = 3;
  uint32 min_replicas = 4;
  uint32 active_replicas = 5;
  bool local = 6;
  string name = 7;
  float spread = 8;
  reserved 9, 10;
  reserved "effective_target", "pressure";
}

message ConnectionSummary {
  NodeRef peer = 1;
  uint32 remote_port = 2 [(buf.validate.field).uint32 = {
    gt: 0
    lte: 65535
  }];
  uint32 local_port = 3 [(buf.validate.field).uint32 = {
    gt: 0
    lte: 65535
  }];
  string service_name = 4;
  pollen.state.v1.ServiceProtocol protocol = 5;
}

message RegisterServiceRequest {
  uint32 port = 1 [(buf.validate.field).uint32 = {
    gt: 0
    lte: 65535
  }];
  optional string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
  }];
  pollen.state.v1.ServiceProtocol protocol = 3;
  reserved 4;
  reserved "properties";
  pollen.admission.v1.Predicate policy = 5;
}

message RegisterServiceResponse {}

message UnregisterServiceRequest {
  uint32 port = 1 [(buf.validate.field).uint32 = {lte: 65535}];
  optional string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
  }];
}

message UnregisterServiceResponse {}

message ConnectPeerRequest {
  bytes peer_pub = 1;
  repeated string addrs = 2;
}

message ConnectPeerResponse {}

message ConnectServiceRequest {
  NodeRef node = 1;
  uint32 remote_port = 2 [(buf.validate.field).uint32 = {
    gt: 0
    lte: 65535
  }];
  uint32 local_port = 3 [(buf.validate.field).uint32 = {lte: 65535}];
  pollen.state.v1.ServiceProtocol protocol = 5;
}

message ConnectServiceResponse {
  uint32 local_port = 1 [(buf.validate.field).uint32 = {
    gt: 0
    lte: 65535
  }];
}

message DisconnectServiceRequest {
  uint32 local_port = 1 [(buf.validate.field).uint32 = {
    gt: 0
    lte: 65535
  }];
}

message DisconnectServiceResponse {}

message DenyPeerRequest {
  bytes peer_pub = 1 [(buf.validate.field).bytes = {len: 32}];
}

message DenyPeerResponse {}

// The first SeedWorkloadRequest must carry `header`; subsequent
// messages carry binary `chunk` fragments.
message SeedWorkloadRequest {
  oneof payload {
    SeedWorkloadHeader header = 1;
    bytes chunk = 2;
  }
}

message SeedWorkloadHeader {
  uint32 min_replicas = 1;
  uint64 memory_bytes = 2;
  uint32 timeout_ms = 3;
  string name = 4;
  float spread = 5;
  reserved 6, 7;
  reserved "latency_slo_ms", "properties";
  pollen.admission.v1.Predicate policy = 8;
}

message SeedWorkloadResponse {
  string hash = 1;
  string name = 2;
}

message UnseedWorkloadRequest {
  string hash = 1 [(buf.validate.field).string = {min_len: 1}];
}

message UnseedWorkloadResponse {}

message CallWorkloadRequest {
  // hash+function specify the target directly. Mutually exclusive with uri:
  // if uri is set, these fields are ignored.
  string hash = 1;
  string function = 2;
  bytes input = 3;
  // uri, when set, addresses the target as a pln:// URI. Currently only the
  // "seed" scheme is supported, e.g. "pln://seed/<name>/<function>".
  string uri = 4;
}

message CallWorkloadResponse {
  bytes output = 1;
}

message GetMetricsRequest {}

enum HealthStatus {
  HEALTH_STATUS_UNSPECIFIED = 0;
  HEALTH_STATUS_HEALTHY = 1;
  HEALTH_STATUS_DEGRADED = 2;
  HEALTH_STATUS_UNHEALTHY = 3;
}

message GetMetricsResponse {
  uint32 peers_discovered = 1;
  uint32 peers_connecting = 2;
  uint32 peers_connected = 3;
  uint32 peers_unreachable = 4;
  uint64 events_applied = 5;
  uint64 events_stale = 6;
  double vivaldi_error = 7;
  double cert_expiry_seconds = 8;
  uint64 cert_renewals = 9;
  uint64 cert_renewals_failed = 10;
  uint64 punch_attempts = 11;
  uint64 punch_failures = 12;
  HealthStatus health = 13;
  uint64 vivaldi_samples = 14;
  uint64 eager_syncs = 15;
  uint64 eager_sync_failures = 16;
}

message IssueCertRequest {
  bytes peer_pub = 1 [(buf.validate.field).bytes = {len: 32}];
  reserved 2, 3;
  reserved "admin", "attributes";
  pollen.admission.v1.Capabilities cert_caps = 4 [(buf.validate.field).required = true];
}

message IssueCertResponse {}

message FetchBlobRequest {
  string hash = 1 [(buf.validate.field).string = {
    pattern: "^[a-fA-F0-9]{64}$"
    len: 64
  }];
}

message FetchBlobResponse {
  bytes chunk = 1;
}

// The first UploadBlobRequest must carry `header`; subsequent messages
// carry binary `chunk` fragments.
message UploadBlobRequest {
  oneof payload {
    UploadBlobHeader header = 1;
    bytes chunk = 2;
  }
}

message UploadBlobHeader {
  optional string name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
  reserved 2;
  reserved "properties";
  bool anchor = 3;
  pollen.admission.v1.Predicate policy = 4;
}

message UploadBlobResponse {
  string hash = 1;
}

message RemoveBlobRequest {
  string hash = 1 [(buf.validate.field).string = {
    pattern: "^[a-fA-F0-9]{64}$"
    len: 64
  }];
}

message RemoveBlobResponse {}

message SeedStaticRequest {
  string name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
  bytes manifest_digest = 2 [(buf.validate.field).bytes = {len: 32}];
  reserved 3, 4;
  reserved "min_replicas", "properties";
  pollen.admission.v1.Predicate policy = 5;
}

message SeedStaticResponse {}

message UnseedStaticRequest {
  string name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
}

message UnseedStaticResponse {}

message ListStaticRequest {}

message StaticSummary {
  string name = 1;
  bytes manifest_digest = 2;
  reserved 3;
  reserved "min_replicas";
  repeated NodeRef claimants = 4;
  NodeRef publisher = 5;
  bool local = 6;
  uint32 serving_capacity = 7;
}

message ListStaticResponse {
  repeated StaticSummary sites = 1;
}

message InspectRequest {
  oneof target {
    bytes node_pub = 1 [(buf.validate.field).bytes = {len: 32}];
    string workload_hash = 2 [(buf.validate.field).string = {
      pattern: "^[a-fA-F0-9]{64}$"
      len: 64
    }];
    string static_name = 3 [(buf.validate.field).string = {
      min_len: 1
      max_len: 255
    }];
    string blob_hash = 4 [(buf.validate.field).string = {
      pattern: "^[a-fA-F0-9]{64}$"
      len: 64
    }];
    InspectServiceTarget service = 5;
  }
}

message InspectServiceTarget {
  string name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
  }];
  bytes provider_pub = 2 [(buf.validate.field).bytes = {len: 32}];
}

message InspectResponse {
  // Resource-detail variants (workload/static/blob/service) are added in
  // a follow-up. The Inspect handler returns codes.Unimplemented for
  // those request targets until those variants land.
  oneof detail {
    NodeDetail node = 1;
  }
}

// NodeDetail bundles per-peer state assembled from the gossip snapshot:
// the public summary, the peer's delegation cert (including issuer chain
// up to the root), telemetry, and the set of resources the peer publishes.
message NodeDetail {
  NodeSummary summary = 1;
  // cert mirrors the local-node CertInfo shape but for the inspected peer.
  // Tier (admin/publisher/leaf) and attributes are derived from
  // cert.capabilities; expiry and access deadline come from claims.
  CertInfo cert = 2;
  // issuer_chain lists the delegation chain from root down to the issuer
  // immediately above this peer. Empty for a root cert.
  repeated NodeRef issuer_chain = 3;
  string nat_type = 4;
  double vivaldi_x = 5;
  double vivaldi_y = 6;
  double vivaldi_height = 7;
  double vivaldi_error = 8;
  // reachable_peers lists the peer-ids this node vouches it can reach
  // directly. Used by the live-component calculation in state.
  repeated NodeRef reachable_peers = 9;
  uint64 mem_total_bytes = 10;
  repeated string published_services = 13;
  repeated string published_workloads = 14;
  repeated string published_statics = 15;
  repeated string published_blobs = 16;

  reserved 11, 12, 17;
  reserved "admin_capable", "can_serve_static", "seed_call_counts";
}
