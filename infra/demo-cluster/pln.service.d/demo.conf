# Demo-only overrides layered on top of the unit `pln service install`
# writes. Keeps the hardened base while adding:
#   --control-addr :50051   → TCP control API for the exerciser
#   --http :9090            → Prometheus scrape endpoint
#   PLN_DEBUG_PPROF=1       → /debug/pprof on the metrics server
#
# MemoryDenyWriteExecute is relaxed so wazero can use its JIT compiler
# instead of falling back to the interpreter — demo load tests care
# about throughput.

[Service]
Environment=PLN_DEBUG_PPROF=1
MemoryDenyWriteExecute=no

# A bare `ExecStart=` clears the inherited list, then we re-specify.
ExecStart=
ExecStart=/usr/bin/pln --dir /var/lib/pln up --control-addr :50051 --http :9090
