---
# Install pln on all nodes.
# Usage: ansible-playbook install.yml -i inventories/<env>.py -e pln_version=v0.1.0-alpha.36

- name: Install pln
  hosts: all
  become: true
  gather_facts: false

  pre_tasks:
    - name: Validate pln_version is set
      ansible.builtin.assert:
        that: pln_version is defined and pln_version | length > 0
        fail_msg: "pln_version must be set (e.g. -e pln_version=v0.1.0-alpha.36)"

    - name: Check if cloud-init is available
      ansible.builtin.command: which cloud-init
      register: cloud_init_check
      failed_when: false
      changed_when: false

    - name: Wait for cloud-init to finish
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
      when: cloud_init_check.rc == 0

  tasks:
    - name: Install pln
      ansible.builtin.include_tasks: tasks/install-pln.yml
