---
# Generate invite tokens on root and join all other nodes.
# Works with both mixed (relays + private) and all-public topologies.
#
# Mixed:      ansible-playbook join-cluster.yml -i inventories/vivaldi.py
# All-public: ansible-playbook join-cluster.yml -i inventories/vivaldi_public.py

- name: Generate invite tokens
  hosts: root
  become: true
  gather_facts: false

  tasks:
    - name: Count nodes to invite
      ansible.builtin.set_fact:
        invite_count: >-
          {{ (groups.get('relays', []) | length)
           + (groups.get('private', []) | length)
           + (groups.get('public', []) | length) }}

    - name: Generate tokens (single SSH session)
      ansible.builtin.shell: |
        for i in $(seq {{ invite_count }}); do
          token=$(pln invite --ttl 10m)
          printf '%s\n' "$token"
        done
      register: invite_raw
      changed_when: true

    - name: Store token list
      ansible.builtin.set_fact:
        invite_tokens: "{{ invite_raw.stdout_lines }}"

- name: Join relay nodes
  hosts: relays
  become: true
  gather_facts: false
  serial: 1

  tasks:
    - name: Check if pln is already running
      ansible.builtin.command: systemctl is-active pln
      register: pln_check
      failed_when: false
      changed_when: false

    - name: Join cluster as public relay
      ansible.builtin.command: >
        pln join --public '{{ hostvars[groups["root"][0]].invite_tokens[groups["relays"].index(inventory_hostname)] }}'
      when: pln_check.rc != 0
      changed_when: true

- name: Join private nodes
  hosts: private
  become: true
  gather_facts: false

  tasks:
    - name: Check if pln is already running
      ansible.builtin.command: systemctl is-active pln
      register: pln_check
      failed_when: false
      changed_when: false

    - name: Join cluster
      ansible.builtin.command: >
        pln join '{{ hostvars[groups["root"][0]].invite_tokens[groups["relays"] | length + groups["private"].index(inventory_hostname)] }}'
      when: pln_check.rc != 0
      changed_when: true

- name: Join public nodes
  hosts: public
  become: true
  gather_facts: false

  tasks:
    - name: Check if pln is already running
      ansible.builtin.command: systemctl is-active pln
      register: pln_check
      failed_when: false
      changed_when: false

    - name: Join cluster as public node
      ansible.builtin.command: >
        pln join --public '{{ hostvars[groups["root"][0]].invite_tokens[groups["public"].index(inventory_hostname)] }}'
      when: pln_check.rc != 0
      changed_when: true
