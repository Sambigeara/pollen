---
# Initialize the vivaldi cluster root node.
# Usage: ansible-playbook init-cluster.yml -i inventories/vivaldi.py

- name: Initialize cluster root
  hosts: root
  become: true
  gather_facts: false

  tasks:
    - name: Check if pln is already running
      ansible.builtin.command: systemctl is-active pln
      register: pln_check
      failed_when: false
      changed_when: false

    - name: Initialize pln
      ansible.builtin.command: pln init
      when: pln_check.rc != 0
      changed_when: true

    - name: Start pln daemon (public relay)
      ansible.builtin.command: pln up --public -d
      when: pln_check.rc != 0
      changed_when: true

    - name: Wait for daemon readiness
      ansible.builtin.command: pln status
      register: status_check
      until: status_check.rc == 0
      retries: 10
      delay: 3
      changed_when: false
