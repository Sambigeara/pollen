---
# In-place upgrade: reinstall pln, .deb postinstall restarts the service.
# Usage: ansible-playbook upgrade.yml -i inventories/<env>.py -e pln_version=v0.1.0-alpha.37

- name: Upgrade pln
  hosts: all
  become: true
  gather_facts: false

  pre_tasks:
    - name: Validate pln_version is set
      ansible.builtin.assert:
        that: pln_version is defined and pln_version | length > 0
        fail_msg: "pln_version must be set (e.g. -e pln_version=v0.1.0-alpha.37)"

  tasks:
    - name: Install pln
      ansible.builtin.include_tasks: tasks/install-pln.yml
