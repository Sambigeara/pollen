version: 2
project_name: pln
before:
  hooks:
    # Bake the release tag into install.sh so users don't need a GitHub
    # API round-trip to discover the latest version. The rendered copy
    # lives outside dist/ because goreleaser asserts dist/ is empty
    # after before-hooks run. The second hook fails loudly if the
    # sentinel drifts and the substitution silently no-ops.
    - sh -c 'mkdir -p .goreleaser-extras && sed "s|^VERSION=\"__VERSION__\"|VERSION=\"$(git describe --tags --abbrev=0)\"|" scripts/install.sh > .goreleaser-extras/install.sh'
    - sh -c 'grep -q "^VERSION=\"$(git describe --tags --abbrev=0)\"$" .goreleaser-extras/install.sh'
release:
  extra_files:
    - glob: ./.goreleaser-extras/install.sh
builds:
  - main: ./cmd/pln
    ldflags:
      - -s -w -X main.version={{ .Tag }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: checksums.txt
nfpms:
  - vendor: "Sambigeara"
    homepage: "https://github.com/sambigeara/pollen"
    maintainer: "Sambigeara"
    description: "Mesh network daemon"
    # license: "MIT"
    formats: [deb, rpm]
    bindir: /usr/bin
    # The systemd unit is embedded in the binary and written by
    # `pln daemon install` in the postinstall hook — no need to ship it
    # as a packaged file as well.
    scripts:
      postinstall: packaging/postinstall.sh
      preremove: packaging/preremove.sh
brews:
  - repository:
      owner: sambigeara
      name: homebrew-pln
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    description: "Mesh network daemon"
    install: |
      bin.install "pln"
    service: |
      run [opt_bin/"pln", "--dir", Dir.home + "/.pln", "up"]
      keep_alive true
      log_path var/"log/pln.log"
      error_log_path var/"log/pln.log"
